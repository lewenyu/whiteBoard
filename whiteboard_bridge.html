<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TEduBoard</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f7fb;
    }

    #board-container {
      width: 100%;
      height: 100%;
    }

    #control-panel {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 9999;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: min(420px, calc(100vw - 24px));
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(8px);
    }

    #control-panel button {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #0f172a;
      color: #f8fafc;
      font: 12px/1.2 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
    }

    #control-panel button.secondary {
      background: #334155;
    }

    #control-panel button.color-red {
      background: #dc2626;
    }

    #control-panel button.color-blue {
      background: #2563eb;
    }

    #control-panel button.color-green {
      background: #16a34a;
    }

    #control-panel button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #control-panel button.is-active {
      outline: 2px solid #0f172a;
      outline-offset: 2px;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.12);
    }

    #control-panel .status {
      width: 100%;
      font: 12px/1.5 Menlo, Monaco, Consolas, monospace;
      color: #334155;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #debug-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      width: min(420px, calc(100vw - 24px));
      max-height: min(50vh, 420px);
      overflow: auto;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.88);
      color: #e2e8f0;
      font: 12px/1.5 Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(8px);
    }

    #debug-panel strong {
      display: block;
      margin-bottom: 8px;
      color: #f8fafc;
      font-size: 13px;
    }
  </style>
  <!-- 运行白板所需的第三方脚本，按 SDK 依赖顺序加载。 -->
  <script src="https://res.qcloudtiw.com/board/third/axios/axios.min.js"></script>
  <script src="https://res.qcloudtiw.com/board/third/cos/5.1.0/cos.min.js"></script>
  <script src="https://res.qcloudtiw.com/board/2.9.12/TEduBoard.min.js"></script>
  <!-- TIM JS SDK，用于白板信令的 IM 群消息中转 -->
  <script src="https://unpkg.com/tim-js-sdk@2.27.6/tim-js.js"></script>
  <script src="https://unpkg.com/tim-upload-plugin@1.4.3/index.js"></script>
  <script src="https://unpkg.com/tim-profanity-filter-plugin@1.1.0/index.js"></script>
</head>
<body>
  <div id="board-container"></div>
  <div id="control-panel">
    <button type="button" data-action="addBoard">新增白板页</button>
    <button type="button" data-action="addDebugTranscodeFile" class="secondary">添加调试转码文件</button>
    <button type="button" data-action="toggleDrawMode" class="secondary">切换到浏览模式</button>
    <button type="button" data-action="setToolType" data-tool="TEDU_BOARD_TOOL_TYPE_PEN">画笔</button>
    <button type="button" data-action="setToolType" data-tool="TEDU_BOARD_TOOL_TYPE_ERASER">橡皮擦</button>
    <button type="button" data-action="undo" class="secondary">撤销</button>
    <button type="button" data-action="redo" class="secondary">重做</button>
    <button type="button" data-action="clear" class="secondary">清空当前页</button>
    <button type="button" data-action="setBrushColor" data-color="#dc2626" class="color-red">红笔</button>
    <button type="button" data-action="setBrushColor" data-color="#2563eb" class="color-blue">蓝笔</button>
    <button type="button" data-action="setBrushColor" data-color="#16a34a" class="color-green">绿笔</button>
    <button type="button" data-action="setBrushThin" data-size="4" class="secondary">细笔</button>
    <button type="button" data-action="setBrushThin" data-size="24" class="secondary">中笔</button>
    <button type="button" data-action="setBrushThin" data-size="100" class="secondary">粗笔</button>
    <button type="button" data-action="getBoardList" class="secondary">获取白板列表</button>
    <div id="control-status" class="status">控件已加载。</div>
  </div>
  <div id="debug-panel"><strong>TEduBoard Debug</strong>Loading...</div>

  <script>
    (function () {
      var DEFAULT_FLUTTER_CHANNEL = 'FlutterWhiteboardChannel';
      var DEFAULT_JS_BRIDGE = 'WhiteboardWebBridge';
      var BOARD_CONTAINER_ID = 'board-container';
      var DEBUG_PANEL_ID = 'debug-panel';
      var CONTROL_PANEL_ID = 'control-panel';
      var CONTROL_STATUS_ID = 'control-status';
      var DEBUG_INIT_OPTIONS = {
        classId: 107980015,
        sdkAppId: 1400091350,
        userId: '15_8262',
        userSig: 'eJyrVgrxCdZLrSjILEpVsjI0NTU1MjAw0AGLlqUWKVkpGekZKEH4xSnZiQUFmSlAdSZARZaGxqZQlZkpqXklmWmZYA2GpvEWRmZGME2Z6UCxoAJz05y0Uo8Q7UDfRONMfzN3Y203d-OqPD*LvDTtRJNKM*PcChfnkkSnSFuoxpLMXJCLzM3MTc0tLYxNawEUaDAm'
      };
      var DEBUG_TRANSCODE_FILE_URL = 'https://resource.lingshi.com/document/gjnjdt7frd5m9ciq1nvc_tiw/h5/index.html';
      var DEBUG_TRANSCODE_FILE_TITLE = '调试转码文件';
      // 调试位：true=白板 ready 后自动添加转码文件，false=仅手动点击按钮添加。
      var DEBUG_AUTO_ADD_TRANSCODE_FILE = false;
      var DRAW_MODE_ACTION = 'toggleDrawMode';
      var currentDrawMode = 'pen';
      var bridgeConfig = resolveBridgeConfig();
      var board = null;
      var boardReady = false;

      // 方法分类规划（仅用于维护可读性，不参与运行逻辑）
      var METHOD_CATEGORIES = {
        config: ['resolveBridgeConfig'],
        debugUI: ['normalizeError', 'stringifyDebugValue', 'updateDebugPanel', 'updateControlStatus'],
        timRelay: ['initTIM', 'sendSyncDataViaTIM'],
        boardStateUI: ['updateDrawModeButton', 'updateBrushThinButtons', 'setControlsDisabled'],
        boardFileOps: ['resolveH5FileType', 'buildDebugTranscodeFileData', 'addDebugTranscodeFile'],
        boardLifecycle: ['ensureBoardReady', 'bindBoardEvents', 'initBoard', 'destroyBoard'],
        boardInvoke: ['addSyncData', 'resizeBoard', 'invokeBoardMethod', 'applyDrawMode', 'toggleDrawMode'],
        controls: ['handleControlAction', 'bindControls'],
        bridge: ['safely', 'exposeBridge', 'bridgeApi']
      };

      // ======================== 配置解析 ========================
      // 优先读取 URL 参数，其次读取运行时注入的配置，最后回退到默认值。
      // 解析 Flutter 通道与 JS Bridge 名称。
      function resolveBridgeConfig() {
        var search = new URLSearchParams(window.location.search);
        var runtimeConfig = window.__WHITEBOARD_BRIDGE_CONFIG__ || {};

        return {
          flutterChannel: search.get('flutterChannel') || runtimeConfig.flutterChannel || DEFAULT_FLUTTER_CHANNEL,
          jsBridge: search.get('jsBridge') || runtimeConfig.jsBridge || DEFAULT_JS_BRIDGE
        };
      }

      // ======================== TIM 信令中转 ========================
      // ── TIM 信令中转（官网推荐方案） ────────────────────────
      // 通过 TIM 群消息中转白板信令，支持跨浏览器/跨设备实时同步。
      // BroadcastChannel 作为同浏览器内多 Tab 的低延迟补充。
      var tim = null;
      var timReady = false;
      var TIM_GROUP_ID = String(DEBUG_INIT_OPTIONS.classId);
      var TIM_BOARD_EXT = 'TXWhiteBoardExt';

      var SYNC_CHANNEL_NAME = 'teboard_debug_sync_' + DEBUG_INIT_OPTIONS.classId;
      var syncChannel = typeof BroadcastChannel !== 'undefined'
        ? new BroadcastChannel(SYNC_CHANNEL_NAME)
        : null;

      if (syncChannel) {
        syncChannel.onmessage = function (event) {
          if (board && event.data && event.data.type === 'syncData') {
            try {
              board.addSyncData(event.data.payload);
            } catch (e) {}
          }
        };
      }

      // 初始化 TIM 实例、登录并绑定收发事件。
      function initTIM() {
        if (typeof TIM === 'undefined') {
          updateDebugPanel('TIM SDK 未加载', { hint: '检查网络或 CDN 是否可访问' });
          return;
        }

        tim = TIM.create({ SDKAppID: DEBUG_INIT_OPTIONS.sdkAppId });

        if (typeof TIMUploadPlugin !== 'undefined') {
          tim.registerPlugin({ 'tim-upload-plugin': TIMUploadPlugin });
        }
        if (typeof TIMProfanityFilterPlugin !== 'undefined') {
          tim.registerPlugin({ 'tim-profanity-filter-plugin': TIMProfanityFilterPlugin });
        }

        tim.setLogLevel(1);

        // SDK 就绪后标记可用并尝试入群。
        function handleSdkReady() {
          timReady = true;
          updateDebugPanel('TIM 已就绪', {
            userId: DEBUG_INIT_OPTIONS.userId,
            groupId: TIM_GROUP_ID,
            uploadPlugin: typeof TIMUploadPlugin !== 'undefined',
            profanityFilterPlugin: typeof TIMProfanityFilterPlugin !== 'undefined'
          });
          // 加入群组（若已是成员会返回 already 错误，可忽略）
          tim.joinGroup({ groupID: TIM_GROUP_ID }).catch(function () {});
        }

        // SDK 不可用时同步更新连接状态。
        function handleSdkNotReady() {
          timReady = false;
          updateDebugPanel('TIM 连接断开', {});
        }

        // 接收群消息并提取白板同步数据。
        function handleMessageReceived(event) {
          if (!board) {
            return;
          }

          var messages = event.data;
          messages.forEach(function (message) {
            if (message.conversationType !== TIM.TYPES.CONV_GROUP) { return; }
            if (message.to !== TIM_GROUP_ID) { return; }
            if (message.from === DEBUG_INIT_OPTIONS.userId) { return; } // 过滤自己发出的消息

            // 兼容新版 payload API
            if (message.type === TIM.TYPES.MSG_CUSTOM &&
                message.payload &&
                message.payload.extension === TIM_BOARD_EXT) {
              try {
                board.addSyncData(JSON.parse(message.payload.data));
              } catch (e) {}
              return;
            }

            // 兼容旧版 getElements API
            if (typeof message.getElements === 'function') {
              var elements = message.getElements();
              elements.forEach(function (element) {
                if (element.type === 'TIMCustomElem' &&
                    element.content &&
                    element.content.extension === TIM_BOARD_EXT) {
                  try {
                    board.addSyncData(JSON.parse(element.content.data));
                  } catch (e) {}
                }
              });
            }
          });
        }

        tim.on(TIM.EVENT.SDK_READY, handleSdkReady);
        tim.on(TIM.EVENT.SDK_NOT_READY, handleSdkNotReady);
        // 接收端：解析白板信令并调用 addSyncData
        tim.on(TIM.EVENT.MESSAGE_RECEIVED, handleMessageReceived);

        tim.login({
          userID: DEBUG_INIT_OPTIONS.userId,
          userSig: DEBUG_INIT_OPTIONS.userSig
        }).then(function () {
          updateDebugPanel('TIM 登录成功', { userId: DEBUG_INIT_OPTIONS.userId });
        }).catch(function (err) {
          updateDebugPanel('TIM 登录失败', { error: err.message });
        });
      }

      // 发送端：把 syncData 包装成 TIM 自定义群消息发出去
      // 把白板同步数据通过 TIM 高优先级群消息发送。
      function sendSyncDataViaTIM(data) {
        if (!tim || !timReady) { return; }
        var message = tim.createCustomMessage({
          to: TIM_GROUP_ID,
          conversationType: TIM.TYPES.CONV_GROUP,
          priority: TIM.TYPES.MSG_PRIORITY_HIGH,
          payload: {
            data: JSON.stringify(data),
            description: '',
            extension: TIM_BOARD_EXT
          }
        });
        tim.sendMessage(message).catch(function (err) {
          updateDebugPanel('TIM 发送失败', { error: err.message });
        });
      }

      // ======================== 桥接通信 ========================
      // Web -> Flutter 的统一出口，Flutter 侧只需要解析一种消息结构。
      // 统一向 Flutter 发消息，并对 syncData 做多通道转发。
      function postToFlutter(type, payload) {
        // syncData 同时走 TIM（跨设备）和 BroadcastChannel（同浏览器多 Tab）
        if (type === 'syncData') {
          sendSyncDataViaTIM(payload);
          if (syncChannel) {
            syncChannel.postMessage({ type: 'syncData', payload: payload });
          }
        }

        var channel = window[bridgeConfig.flutterChannel];
        if (!channel || typeof channel.postMessage !== 'function') {
          return;
        }

        channel.postMessage(JSON.stringify({
          type: type,
          payload: payload || null,
          timestamp: Date.now()
        }));
      }

      // ======================== 调试与展示工具 ========================
  // 标准化错误对象，便于 UI 与桥接层统一处理。
      function normalizeError(error) {
        if (!error) {
          return { message: 'unknown error' };
        }

        if (typeof error === 'string') {
          return { message: error };
        }

        return {
          message: error.message || 'unknown error',
          stack: error.stack || null
        };
      }

      // 把任意值转换成可展示的调试字符串。
      function stringifyDebugValue(value) {
        if (value === undefined) {
          return 'undefined';
        }

        if (typeof value === 'string') {
          return value;
        }

        try {
          return JSON.stringify(value, null, 2);
        } catch (error) {
          return String(value);
        }
      }

      // 更新右上角调试面板内容。
      function updateDebugPanel(title, details) {
        var panel = document.getElementById(DEBUG_PANEL_ID);
        if (!panel) {
          return;
        }

        panel.innerHTML = '<strong>' + title + '</strong>' + stringifyDebugValue(details);
      }

      // 更新左上角控制区状态文本。
      function updateControlStatus(title, details) {
        var panel = document.getElementById(CONTROL_STATUS_ID);
        if (!panel) {
          return;
        }

        panel.textContent = title + '\n' + stringifyDebugValue(details);
      }

      // ======================== 白板状态 UI 方法 ========================
      // 根据当前模式刷新“切换模式”按钮文案。
      function updateDrawModeButton() {
        var panel = document.getElementById(CONTROL_PANEL_ID);
        if (!panel) {
          return;
        }

        var button = panel.querySelector('button[data-action="' + DRAW_MODE_ACTION + '"]');
        if (!button) {
          return;
        }

        button.textContent = currentDrawMode === 'pen' ? '切换到浏览模式' : '切换到画笔模式';
      }

      // 高亮当前生效的笔粗细按钮。
      function updateBrushThinButtons(brushThin) {
        var panel = document.getElementById(CONTROL_PANEL_ID);
        if (!panel) {
          return;
        }

        var buttons = panel.querySelectorAll('button[data-action="setBrushThin"]');
        buttons.forEach(function (button) {
          var size = Number(button.getAttribute('data-size'));
          if (size === Number(brushThin)) {
            button.classList.add('is-active');
          } else {
            button.classList.remove('is-active');
          }
        });
      }

      // 批量设置控制面板按钮的可用状态。
      function setControlsDisabled(disabled) {
        var panel = document.getElementById(CONTROL_PANEL_ID);
        if (!panel) {
          return;
        }

        var buttons = panel.querySelectorAll('button');
        buttons.forEach(function (button) {
          button.disabled = disabled;
        });
      }

      // ======================== 白板绘制模式 ========================
      // 应用绘制/浏览模式到白板实例并返回当前模式信息。
      function applyDrawMode(mode) {
        ensureBoardReady();

        var nextMode = mode === 'browse' ? 'browse' : 'pen';
        currentDrawMode = nextMode;

        if (typeof board.setDrawEnable === 'function') {
          board.setDrawEnable(true);
        }

        if (typeof board.setDisableDrawActionEvent === 'function') {
          board.setDisableDrawActionEvent(nextMode === 'browse');
        }

        if (typeof board.setToolType === 'function' && TEduBoard && TEduBoard.TOOL_TYPE) {
          var toolType = nextMode === 'browse'
            ? TEduBoard.TOOL_TYPE.TEDU_BOARD_TOOL_TYPE_MOUSE
            : TEduBoard.TOOL_TYPE.TEDU_BOARD_TOOL_TYPE_PEN;
          board.setToolType(toolType);
        }

        updateDrawModeButton();

        return {
          mode: nextMode,
          disableDrawActionEvent: nextMode === 'browse'
        };
      }

      // 在画笔模式和浏览模式之间切换。
      function toggleDrawMode() {
        var nextMode = currentDrawMode === 'pen' ? 'browse' : 'pen';
        var result = applyDrawMode(nextMode);
        updateControlStatus('执行成功: toggleDrawMode', result);
        return result;
      }

      // ======================== 调试文件操作 ========================
      // 兼容不同 SDK 版本，解析可用的 H5 文件类型枚举。
      function resolveH5FileType() {
        if (!TEduBoard || !TEduBoard.FILE_TYPE) {
          return null;
        }

        var map = TEduBoard.FILE_TYPE;
        var candidates = [
          'TEDU_BOARD_FILE_TYPE_H5',
          'H5',
          'TEDU_BOARD_FILE_TYPE_H5PPT',
          'H5PPT'
        ];

        for (var i = 0; i < candidates.length; i += 1) {
          if (Object.prototype.hasOwnProperty.call(map, candidates[i])) {
            return map[candidates[i]];
          }
        }

        return null;
      }

      // 组装调试转码文件的请求参数。
      function buildDebugTranscodeFileData() {
        var data = {
          title: DEBUG_TRANSCODE_FILE_TITLE,
          url: DEBUG_TRANSCODE_FILE_URL
        };

        var h5FileType = resolveH5FileType();
        if (h5FileType !== null && h5FileType !== undefined) {
          data.fileType = h5FileType;
        }

        return data;
      }

      // 添加调试转码文件（优先走 H5 模式）并自动切换。
      function addDebugTranscodeFile() {
        ensureBoardReady();
        var payload = buildDebugTranscodeFileData();
        var method = null;
        var result;
        var fileId = null;
        var isH5Entry = /\/h5\/index\.html(?:\?.*)?$/i.test(payload.url) || /\.html(?:\?.*)?$/i.test(payload.url);
        var existingFile = null;

        if (typeof board.getFileInfoList === 'function') {
          var fileInfoList = board.getFileInfoList() || [];
          for (var index = 0; index < fileInfoList.length; index += 1) {
            if (fileInfoList[index].downloadURL === payload.url) {
              existingFile = fileInfoList[index];
              break;
            }
          }
        }

        if (isH5Entry && typeof board.addH5File === 'function') {
          method = 'addH5File';
          if (existingFile && existingFile.h5FileEnableDraw === false && typeof board.deleteFile === 'function') {
            board.deleteFile(existingFile.fid);
            existingFile = null;
          }
          // addH5File(url, title, needSwitch, enableDraw)
          // 对调试 H5 显式开启 enableDraw，否则 H5 文件默认不可涂鸦。
          fileId = board.addH5File(payload.url, payload.title, true, true);
          result = { fileId: fileId, enableDraw: true };
        } else if (typeof board.addTranscodeFile === 'function') {
          method = 'addTranscodeFile';
          fileId = board.addTranscodeFile(payload);
          result = { fileId: fileId };
        } else if (typeof board.addH5File === 'function') {
          method = 'addH5File';
          fileId = board.addH5File(payload.url, payload.title, true, true);
          result = { fileId: fileId, enableDraw: true };
        } else {
          throw new Error('Unsupported board methods: addTranscodeFile/addH5File');
        }

        if (fileId && typeof board.switchFile === 'function') {
          board.switchFile(fileId);
          result.switched = true;
        }

        if (isH5Entry) {
          result.drawMode = applyDrawMode(currentDrawMode);
        }

        var response = {
          method: method,
          isH5Entry: isH5Entry,
          request: payload,
          result: result
        };

        updateControlStatus('执行成功: addDebugTranscodeFile', response);
        return response;
      }

      // ======================== 白板生命周期与调用 ========================
      // 断言白板实例已初始化，未初始化时抛错。
      function ensureBoardReady() {
        if (!board) {
          throw new Error('TEduBoard has not been initialized');
        }
      }

      // 统一把白板 SDK 的关键事件转发给 Flutter，页面本身不承载业务逻辑。
      // 绑定白板核心事件并转发到 Flutter 通道。
      function bindBoardEvents() {
        if (TEduBoard.EVENT.TEB_INIT) {
          board.on(TEduBoard.EVENT.TEB_INIT, function () {
            boardReady = true;
            setControlsDisabled(false);
            updateDebugPanel('TEduBoard Ready', {
              classId: DEBUG_INIT_OPTIONS.classId,
              userId: DEBUG_INIT_OPTIONS.userId,
              boardReady: boardReady
            });
            updateControlStatus('白板已就绪', {
              toolType: typeof board.getToolType === 'function' ? board.getToolType() : null,
              drawMode: currentDrawMode,
              brushThin: typeof board.getBrushThin === 'function' ? board.getBrushThin() : null
            });
            postToFlutter('boardReady', {
              classId: DEBUG_INIT_OPTIONS.classId,
              userId: DEBUG_INIT_OPTIONS.userId
            });

            updateDrawModeButton();
            applyDrawMode(currentDrawMode);
            if (typeof board.getBrushThin === 'function') {
              updateBrushThinButtons(board.getBrushThin());
            }

            if (DEBUG_AUTO_ADD_TRANSCODE_FILE) {
              try {
                addDebugTranscodeFile();
              } catch (error) {
                updateControlStatus('执行失败: addDebugTranscodeFile', normalizeError(error));
              }
            }
          });
        }

        board.on(TEduBoard.EVENT.TEB_ERROR, function (code, msg) {
          updateDebugPanel('TEduBoard Error', { code: code, message: msg });
          postToFlutter('boardError', { code: code, message: msg });
        });

        board.on(TEduBoard.EVENT.TEB_WARNING, function (code, msg) {
          updateDebugPanel('TEduBoard Warning', { code: code, message: msg });
          postToFlutter('boardWarning', { code: code, message: msg });
        });

        // Web SDK 的白板信令回调交给 Flutter，由 Flutter 统一走 IM 转发。
        board.on(TEduBoard.EVENT.TEB_SYNCDATA, function (data) {
          postToFlutter('syncData', data);
        });

        board.on(TEduBoard.EVENT.TEB_HISTROYDATA_SYNCCOMPLETED, function () {
          postToFlutter('historyDataSyncCompleted');
        });

        board.on(TEduBoard.EVENT.TEB_ADDBOARD, function (boardIds, fileId) {
          postToFlutter('addBoard', { boardIds: boardIds, fileId: fileId || null });
        });

        board.on(TEduBoard.EVENT.TEB_DELETEBOARD, function (boardIds, fileId) {
          postToFlutter('deleteBoard', { boardIds: boardIds, fileId: fileId || null });
        });

        board.on(TEduBoard.EVENT.TEB_GOTOBOARD, function (boardId, fileId) {
          postToFlutter('gotoBoard', { boardId: boardId, fileId: fileId || null });
        });
      }

      // 初始化时如果已有旧实例，先销毁再重建，避免事件和状态残留。
      // 创建并初始化 TEduBoard 实例。
      function initBoard(options) {
        if (!window.TEduBoard) {
          throw new Error('TEduBoard SDK is not loaded');
        }

        if (!options || !options.classId || !options.sdkAppId || !options.userId || !options.userSig) {
          throw new Error('Missing required init params: classId, sdkAppId, userId, userSig');
        }

        if (board && typeof board.destroy === 'function') {
          board.destroy();
        }

        boardReady = false;

        var initParams = Object.assign({}, options, {
          id: options.id || BOARD_CONTAINER_ID
        });

        board = new TEduBoard(initParams);
        window.__DEBUG_BOARD__ = board;
        bindBoardEvents();

        updateDebugPanel('Initializing TEduBoard', {
          classId: initParams.classId,
          sdkAppId: initParams.sdkAppId,
          userId: initParams.userId
        });

        return { success: true };
      }

      // 销毁白板实例并重置本地状态。
      function destroyBoard() {
        if (board && typeof board.destroy === 'function') {
          board.destroy();
        }
        board = null;
        window.__DEBUG_BOARD__ = null;
        boardReady = false;
        setControlsDisabled(true);
        updateDebugPanel('TEduBoard Destroyed', { success: true });
        postToFlutter('boardDestroyed');
        return { success: true };
      }

      // 接收外部同步数据并注入白板。
      function addSyncData(data) {
        ensureBoardReady();
        board.addSyncData(data);
        return { success: true };
      }

      // 触发白板容器尺寸重算。
      function resizeBoard() {
        ensureBoardReady();
        if (typeof board.resize === 'function') {
          board.resize();
        }
        return { success: true };
      }

      // 透传调用白板实例的指定方法。
      function invokeBoardMethod(method, args) {
        ensureBoardReady();

        if (!method || typeof board[method] !== 'function') {
          throw new Error('Unsupported board method: ' + method);
        }

        var params = Array.isArray(args) ? args : [];
        var result = board[method].apply(board, params);
        return result === undefined ? { success: true } : result;
      }

      // ======================== 控件交互 ========================
      // 处理控制面板按钮动作并调用对应能力。
      function handleControlAction(action, element) {
        if (!action) {
          return;
        }

        try {
          var result;

          if (action === 'addBoard') {
            result = bridgeApi.invoke('addBoard', [null]);
          } else if (action === 'addDebugTranscodeFile') {
            result = addDebugTranscodeFile();
          } else if (action === 'toggleDrawMode') {
            result = toggleDrawMode();
          } else if (action === 'setToolType') {
            var toolKey = element.getAttribute('data-tool');
            var toolType = TEduBoard.TOOL_TYPE[toolKey];
            if (!Object.prototype.hasOwnProperty.call(TEduBoard.TOOL_TYPE, toolKey)) {
              throw new Error('Unknown tool type: ' + toolKey);
            }
            result = bridgeApi.invoke('setToolType', [toolType]);
            currentDrawMode = toolKey === 'TEDU_BOARD_TOOL_TYPE_MOUSE' ? 'browse' : 'pen';
            updateDrawModeButton();
          } else if (action === 'setBrushColor') {
            result = bridgeApi.invoke('setBrushColor', [element.getAttribute('data-color')]);
          } else if (action === 'setBrushThin') {
            result = bridgeApi.invoke('setBrushThin', [Number(element.getAttribute('data-size'))]);
            if (typeof board.getBrushThin === 'function') {
              var appliedBrushThin = board.getBrushThin();
              updateBrushThinButtons(appliedBrushThin);
              result = {
                requestedBrushThin: Number(element.getAttribute('data-size')),
                appliedBrushThin: appliedBrushThin
              };
            }
          } else {
            result = bridgeApi.invoke(action, []);
          }

          updateControlStatus('执行成功: ' + action, result);
        } catch (error) {
          updateControlStatus('执行失败: ' + action, normalizeError(error));
        }
      }

      // 绑定控制面板点击事件。
      function bindControls() {
        var panel = document.getElementById(CONTROL_PANEL_ID);
        if (!panel) {
          return;
        }

        setControlsDisabled(true);

        panel.addEventListener('click', function (event) {
          var target = event.target;
          if (!target || target.tagName !== 'BUTTON') {
            return;
          }

          handleControlAction(target.getAttribute('data-action'), target);
        });
      }

      // ======================== Flutter 桥接 API ========================
      // Flutter 侧只需要调用这一组桥接 API，不需要直接操作页面内部变量。
      var bridgeApi = {
        // 初始化白板实例。
        init: function (options) {
          return safely('init', function () {
            return initBoard(options);
          });
        },
        // 销毁白板实例。
        destroy: function () {
        // 统一包装调用结果与异常，方便 Flutter 侧按固定消息结构处理。
          return safely('destroy', destroyBoard);
        },
        // 注入同步数据到白板。
        addSyncData: function (data) {
          return safely('addSyncData', function () {
            return addSyncData(data);
          });
        },
        // 触发白板重排。
        resize: function () {
          return safely('resize', resizeBoard);
        },
        // Flutter 侧通过 invoke 透传常用 TEduBoard 实例方法，避免 HTML 里堆业务分支。
        // 调用白板实例通用方法。
        invoke: function (method, args) {
          return safely(method || 'invoke', function () {
            return invokeBoardMethod(method, args);
          });
        },
        // 动态更新桥接配置并重新暴露入口。
        setBridgeConfig: function (config) {
          bridgeConfig = Object.assign({}, bridgeConfig, config || {});
          exposeBridge();
          return { success: true, bridgeConfig: bridgeConfig };
        },
        // 返回桥接与白板当前状态快照。
        getState: function () {
          return {
            hasBoard: !!board,
            boardReady: boardReady,
            bridgeConfig: bridgeConfig
          };
        }
      };

      // 统一包装执行结果与错误上报。
      function safely(action, fn) {
        try {
          var result = fn();
          postToFlutter('methodResult', {
            action: action,
            result: result === undefined ? null : result
          });
          return result;
        } catch (error) {
          var normalizedError = normalizeError(error);
          postToFlutter('methodError', {
            action: action,
            error: normalizedError
          });
          throw error;
        }
      }

      // Flutter -> Web 的统一入口挂在 window 上，WebView 直接 evaluateJavascript 即可调用。
      // 挂载桥接 API 到 window 指定名称。
      function exposeBridge() {
        window[bridgeConfig.jsBridge] = bridgeApi;
      }

      bindControls();
      exposeBridge();
      postToFlutter('webBridgeReady', { bridgeConfig: bridgeConfig });
      updateDebugPanel('Web Bridge Ready', {
        bridgeConfig: bridgeConfig,
        autoInit: true
      });

      try {
        initBoard(DEBUG_INIT_OPTIONS);
        initTIM();
      } catch (error) {
        updateDebugPanel('Init Failed', normalizeError(error));
      }

      // 容器尺寸变化时主动通知白板重新布局，避免显示区域错乱。
      window.addEventListener('resize', function () {
        if (board && typeof board.resize === 'function') {
          board.resize();
        }
      });
    })();
  </script>
</body>
</html>
