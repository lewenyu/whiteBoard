<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TEduBoard Bridge</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f7fb;
    }

    #board-container {
      width: 100%;
      height: 100%;
    }

    #debug-panel {
      display: none;
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      width: min(420px, calc(100vw - 24px));
      max-height: min(50vh, 420px);
      overflow: auto;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.88);
      color: #e2e8f0;
      font: 12px/1.5 Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #debug-panel.is-visible {
      display: block;
    }

    #debug-panel strong {
      display: block;
      margin-bottom: 8px;
      color: #f8fafc;
    }
  </style>
  <script src="https://res.qcloudtiw.com/board/third/axios/axios.min.js"></script>
  <script src="https://res.qcloudtiw.com/board/third/cos/5.1.0/cos.min.js"></script>
  <script src="https://res.qcloudtiw.com/board/2.9.13/TEduBoard.min.js"></script>
</head>

<body>
  <div id="board-container"></div>
  <div id="debug-panel"><strong>TEduBoard</strong> loading...</div>

  <script>
    (function () {
      'use strict';

      // =========================================================================
      // 1. 常量
      // =========================================================================
      var DEFAULT_FLUTTER_CHANNEL = 'FlutterWhiteboardChannel';
      var DEFAULT_JS_BRIDGE = 'WhiteboardWebBridge';
      var BOARD_CONTAINER_ID = 'board-container';
      var DEBUG_PANEL_ID = 'debug-panel';
      var TOOL_NAME_MAP = {
        pen: 'TEDU_BOARD_TOOL_TYPE_PEN',
        eraser: 'TEDU_BOARD_TOOL_TYPE_ERASER',
        mouse: 'TEDU_BOARD_TOOL_TYPE_MOUSE'
      };

      /** 透传到 board.xxx 的方法名（Web SDK 方法名） */
      var BOARD_INVOKE_METHODS = [
        'syncAndReload', 'reset', 'setDataSyncEnable', 'getDataSyncEnable',
        'setDrawEnable', 'isDrawEnable', 'setAccessibleUsers',
        'setBrushColor', 'setBrushThin', 'setTextColor', 'setTextStyle', 'setTextSize',
        'setHandwritingEnable', 'setBoardScale', 'getBoardScale',
        'undo', 'redo', 'clear', 'clearDraws', 'setToolType',
        'getToolType', 'getBrushColor', 'getBrushThin',
        'setEraserSize', 'getEraserSize', 'setHighlighterColor', 'getHighlighterColor',
        'addBoard', 'deleteBoard', 'preBoard', 'nextBoard', 'prevStep', 'nextStep',
        'getBoardList', 'getCurrentBoard', 'refresh',
        'setBoardContentFitMode', 'getBoardContentFitMode',
        'setBoardRatio', 'getBoardRatio', 'setBoardRemark', 'getBoardRemark',
        'setBackgroundH5', 'setBackgroundColor', 'setGlobalBackgroundColor',
        'getBackgroundColor', 'getGlobalBackgroundColor', 'setGlobalBackgroundPic', 'getGlobalBackgroundPic',
        'addTranscodeFile', 'deleteFile', 'addH5File', 'addVideoFile', 'addImagesFile', 'addElement',
        'getFileInfoList', 'getFileBoardList', 'getCurrentFile', 'getThumbnail',
        'showVideoControl', 'playVideo', 'pauseVideo', 'seekVideo',
        'setSyncVideoStatusEnable', 'startSyncVideoStatus', 'stopSyncVideoStatus',
        'playAudio', 'pauseAudio', 'seekAudio', 'setAudioVolume', 'getAudioVolume',
        'muteAudio', 'setSyncAudioStatusEnable',
        'setShowPPTAudioControls',
        'removeElement', 'getElementList', 'getElementById', 'setElementById',
        'snapshot', 'exportBoardData'
      ];

      /** TEduBoard.EVENT -> Flutter postMessage.type */
      var EVENT_FLUTTER_TYPE_MAP = {
        TEB_INIT: 'boardReady',
        TEB_ERROR: 'boardError',
        TEB_WARNING: 'boardWarning',
        TEB_SYNCDATA: 'syncData',
        TEB_HISTROYDATA_SYNCCOMPLETED: 'historyDataSyncCompleted',
        TEB_OFFLINE: 'boardOffline',
        TEB_ADDBOARD: 'addBoard',
        TEB_DELETEBOARD: 'deleteBoard',
        TEB_GOTOBOARD: 'gotoBoard',
        TEB_GOTOSTEP: 'gotoStep',
        TEB_REFRESH: 'boardRefresh',
        TEB_UNDOSTATUSCHANGED: 'undoStatusChanged',
        TEB_REDOSTATUSCHANGED: 'redoStatusChanged',
        TEB_IMAGESTATUSCHANGED: 'imageStatusChanged',
        TEB_SETBACKGROUNDIMAGE: 'setBackgroundImage',
        TEB_BACKGROUNDH5STATUSCHANGED: 'backgroundH5StatusChanged',
        TEB_ADDELEMENT: 'addElement',
        TEB_FILETRANSCODEPROGRESS: 'fileTranscodeProgress',
        TEB_ADDTRANSCODEFILE: 'addTranscodeFile',
        TEB_DELETEFILE: 'deleteFile',
        TEB_SWITCHFILE: 'switchFile',
        TEB_FILEUPLOADPROGRESS: 'fileUploadProgress',
        TEB_FILEUPLOADSTATUS: 'fileUploadStatus',
        TEB_H5FILESTATUSCHANGED: 'h5FileStatusChanged',
        TEB_VIDEOSTATUSCHANGED: 'videoStatusChanged',
        TEB_H5PPTMEDIASTATUSCHANGED: 'h5PptMediaStatusChanged',
        TEB_H5PPTSTATUSCHANGED: 'h5PptStatusChanged',
        TEB_ADDIMAGESFILE: 'addImagesFile',
        TEB_RECTSELECTED: 'rectSelected',
        TEB_ADDIMAGEELEMENT: 'addImageElement',
        TEB_SNAPSHOT: 'snapshot',
        TEB_AUDIOSTATUSCHANGED: 'audioStatusChanged',
        TEB_ZOOMSTATUSCHANGED: 'zoomStatusChanged',
        TEB_BOARDREMARKCHANGED: 'boardRemarkChanged',
        TEB_BOARDSCROLLCHANGED: 'boardScrollChanged',
        TEB_MOUSEMOVE: 'mouseMove',
        TEB_ELEMENTPOSITIONCHANGED: 'elementPositionChanged',
        TEB_ELEMENTDELETED: 'elementDeleted',
        TEB_MATHGRAPHSTATUSCHANGED: 'mathGraphStatusChanged',
        TEB_TEXTCOMPONENTSTATUSCHANGED: 'textComponentStatusChanged',
        TEB_TEXTWARN: 'textWarn'
      };

      var EVENT_PAYLOAD_MAPPERS = {
        TEB_ERROR: function (code, msg) { return { code: code, message: msg }; },
        TEB_WARNING: function (code, msg) { return { code: code, message: msg }; },
        TEB_UNDOSTATUSCHANGED: function (canUndo) { return { canUndo: !!canUndo }; },
        TEB_REDOSTATUSCHANGED: function (canRedo) { return { canRedo: !!canRedo }; },
        TEB_ADDBOARD: function (boardIds, fileId) { return { boardIds: boardIds, fileId: fileId || null }; },
        TEB_DELETEBOARD: function (boardIds, fileId) { return { boardIds: boardIds, fileId: fileId || null }; },
        TEB_GOTOBOARD: function (boardId, fileId, userId) {
          return { boardId: boardId, fileId: fileId || null, userId: userId || null };
        },
        TEB_GOTOSTEP: function (currentStep, totalStep) {
          return { currentStep: currentStep, totalStep: totalStep };
        },
        TEB_IMAGESTATUSCHANGED: function (boardId, url, status) {
          return { boardId: boardId, url: url, status: status };
        },
        TEB_SETBACKGROUNDIMAGE: function (url) { return { url: url }; },
        TEB_BACKGROUNDH5STATUSCHANGED: function (boardId, url, status) {
          return { boardId: boardId, url: url, status: status };
        },
        TEB_ADDELEMENT: function (elementId, url) { return { elementId: elementId, url: url }; },
        TEB_ADDTRANSCODEFILE: function (fileId) { return { fileId: fileId }; },
        TEB_DELETEFILE: function (fileId) { return { fileId: fileId }; },
        TEB_SWITCHFILE: function (fileId) { return { fileId: fileId }; },
        TEB_FILEUPLOADPROGRESS: function (fileId, currentBytes, totalBytes, uploadSpeed, percent) {
          return { fileId: fileId, currentBytes: currentBytes, totalBytes: totalBytes, uploadSpeed: uploadSpeed, percent: percent };
        },
        TEB_FILEUPLOADSTATUS: function (fileId, status, errorCode, errorMsg) {
          return { fileId: fileId, status: status, errorCode: errorCode, errorMsg: errorMsg };
        },
        TEB_H5FILESTATUSCHANGED: function (fileId, status) { return { fileId: fileId, status: status }; },
        TEB_VIDEOSTATUSCHANGED: function (fileId, status, progress, duration) {
          return { fileId: fileId, status: status, progress: progress, duration: duration };
        },
        TEB_H5PPTMEDIASTATUSCHANGED: function (fileId, mediaId, status) {
          return { fileId: fileId, mediaId: mediaId, status: status };
        },
        TEB_H5PPTSTATUSCHANGED: function (fileId, status, message) {
          return { fileId: fileId, status: status, message: message || null };
        },
        TEB_ADDIMAGESFILE: function (fileId) { return { fileId: fileId }; },
        TEB_ADDIMAGEELEMENT: function (url) { return { url: url }; },
        TEB_SNAPSHOT: function (path, errorCode, errorMsg) {
          return { path: path, errorCode: errorCode, errorMsg: errorMsg };
        },
        TEB_AUDIOSTATUSCHANGED: function (elementId, status, progress, duration) {
          return { elementId: elementId, status: status, progress: progress, duration: duration };
        }
      };

      // =========================================================================
      // 2. 运行时状态
      // =========================================================================
      var bridgeConfig = resolveBridgeConfig();
      var board = null;
      var boardReady = false;
      var currentDrawMode = 'pen';
      var currentInitOptions = null;
      var syncChannel = null;
      var syncChannelName = '';

      // =========================================================================
      // 3. 工具函数
      // =========================================================================
      function resolveBridgeConfig() {
        var search = new URLSearchParams(window.location.search);
        var runtime = window.__WHITEBOARD_BRIDGE_CONFIG__ || {};
        var debug = search.get('debug') === '1' || !!runtime.debug;
        return {
          flutterChannel: search.get('flutterChannel') || runtime.flutterChannel || DEFAULT_FLUTTER_CHANNEL,
          jsBridge: search.get('jsBridge') || runtime.jsBridge || DEFAULT_JS_BRIDGE,
          debug: debug
        };
      }

      function sanitizeOptionsForLog(options) {
        if (!options) return null;
        return {
          classId: options.classId,
          sdkAppId: options.sdkAppId,
          userId: options.userId,
          userSigPresent: !!options.userSig
        };
      }

      function normalizeError(error) {
        if (!error) return { message: 'unknown error' };
        if (typeof error === 'string') return { message: error };
        return { message: error.message || 'unknown error', stack: error.stack || null };
      }

      function stringifyValue(value) {
        if (value === undefined) return 'undefined';
        if (typeof value === 'string') return value;
        try { return JSON.stringify(value, null, 2); } catch (e) { return String(value); }
      }

      function updateDebugPanel(title, details) {
        if (!bridgeConfig.debug) return;
        var panel = document.getElementById(DEBUG_PANEL_ID);
        if (!panel) return;
        panel.innerHTML = '<strong>' + title + '</strong>' + stringifyValue(details);
      }

      function mapEventPayload(eventKey, args) {
        var mapper = EVENT_PAYLOAD_MAPPERS[eventKey];
        if (mapper) return mapper.apply(null, args);
        if (!args || !args.length) return null;
        if (args.length === 1) return args[0];
        return { args: args };
      }

      function resolveFlutterEventType(eventKey) {
        if (EVENT_FLUTTER_TYPE_MAP[eventKey]) return EVENT_FLUTTER_TYPE_MAP[eventKey];
        return eventKey.replace(/^TEB_/, '').toLowerCase().replace(/_([a-z])/g, function (_, c) {
          return c.toUpperCase();
        });
      }

      function pickSdkConstants(keys) {
        var out = {};
        if (!TEduBoard) return out;
        keys.forEach(function (key) {
          if (TEduBoard[key]) out[key] = TEduBoard[key];
        });
        return out;
      }

      function tryBoardGet(methodNames) {
        for (var i = 0; i < methodNames.length; i += 1) {
          var fn = methodNames[i];
          if (typeof board[fn] === 'function') {
            try { return board[fn](); } catch (e) { }
          }
        }
        return null;
      }

      // =========================================================================
      // 4. Flutter 通信
      // =========================================================================
      function postToFlutter(type, payload) {
        // syncData：上报 Flutter，由 ImManager(V2TIM) 发到白板群（勿在 H5 再登 tim-js-sdk）
        if (type === 'syncData' && bridgeConfig.debug) {
          updateDebugPanel('TEB_SYNCDATA', { payloadType: typeof payload });
        }
        if (type === 'syncData' && syncChannel) {
          syncChannel.postMessage({ type: 'syncData', payload: payload });
        }

        var channel = window[bridgeConfig.flutterChannel];
        if (!channel || typeof channel.postMessage !== 'function') return;

        channel.postMessage(JSON.stringify({
          type: type,
          payload: payload == null ? null : payload,
          timestamp: Date.now()
        }));
      }

      function safely(action, fn) {
        try {
          var result = fn();
          postToFlutter('methodResult', { action: action, result: result === undefined ? null : result });
          return result;
        } catch (error) {
          postToFlutter('methodError', { action: action, error: normalizeError(error) });
          throw error;
        }
      }

      // =========================================================================
      // 5. BroadcastChannel（多标签同步，单 WebView 场景不使用）
      // =========================================================================
      function resetSyncChannel(classId) {
        if (syncChannel) {
          try { syncChannel.close(); } catch (e) { }
          syncChannel = null;
        }
        syncChannelName = 'teboard_sync_' + classId;
        if (typeof BroadcastChannel === 'undefined') return;
        syncChannel = new BroadcastChannel(syncChannelName);
        syncChannel.onmessage = function (event) {
          if (!board || !event.data || event.data.type !== 'syncData') return;
          try { board.addSyncData(event.data.payload); } catch (e) { }
        };
      }

      // =========================================================================
      // 6. TEduBoard 
      // =========================================================================
      function ensureBoardReady() {
        if (!board) throw new Error('TEduBoard has not been initialized');
      }

      function invokeBoardMethod(method, args) {
        ensureBoardReady();
        if (!method || typeof board[method] !== 'function') {
          throw new Error('Unsupported board method: ' + method);
        }
        var params = Array.isArray(args) ? args : [];
        var result = board[method].apply(board, params);
        return result === undefined ? { success: true } : result;
      }

      function applyDrawMode(mode) {
        ensureBoardReady();
        var nextMode = mode === 'browse' ? 'browse' : 'pen';
        currentDrawMode = nextMode;

        if (typeof board.setDrawEnable === 'function') board.setDrawEnable(true);
        if (typeof board.setDisableDrawActionEvent === 'function') {
          board.setDisableDrawActionEvent(nextMode === 'browse');
        }
        if (typeof board.setToolType === 'function' && TEduBoard && TEduBoard.TOOL_TYPE) {
          board.setToolType(nextMode === 'browse'
            ? TEduBoard.TOOL_TYPE.TEDU_BOARD_TOOL_TYPE_MOUSE
            : TEduBoard.TOOL_TYPE.TEDU_BOARD_TOOL_TYPE_PEN);
        }
        return { mode: nextMode };
      }

      function applyShowPPTAudioControls(show) {
        ensureBoardReady();
        if (typeof board.setShowPPTAudioControls !== 'function') return { success: false };
        board.setShowPPTAudioControls(!!show);
        return { success: true, show: !!show };
      }

      function handleBoardInitEvent() {
        boardReady = true;
        updateDebugPanel('boardReady', sanitizeOptionsForLog(currentInitOptions));

        var payload = {
          classId: currentInitOptions && currentInitOptions.classId,
          userId: currentInitOptions && currentInitOptions.userId,
          currentBoardId: tryBoardGet(['getCurrentBoard']),
          currentFileId: tryBoardGet(['getCurrentFile'])
        };
        postToFlutter('boardReady', payload);
        applyDrawMode(currentDrawMode);
        var showPPTAudioControls = currentInitOptions && currentInitOptions.showPPTAudioControls;
        applyShowPPTAudioControls(showPPTAudioControls !== false);
      }

      function bindBoardEvents() {
        if (!board || !TEduBoard || !TEduBoard.EVENT) return;

        Object.keys(TEduBoard.EVENT).forEach(function (eventKey) {
          if (!eventKey || eventKey.indexOf('TEB_') !== 0) return;
          var sdkEvent = TEduBoard.EVENT[eventKey];
          if (!sdkEvent) return;

          board.on(sdkEvent, function () {
            var args = Array.prototype.slice.call(arguments);

            if (eventKey === 'TEB_INIT') {
              handleBoardInitEvent();
              return;
            }
            if (eventKey === 'TEB_ERROR') {
              updateDebugPanel('boardError', { code: args[0], message: args[1] });
            } else if (eventKey === 'TEB_WARNING') {
              updateDebugPanel('boardWarning', { code: args[0], message: args[1] });
            }

            postToFlutter(resolveFlutterEventType(eventKey), mapEventPayload(eventKey, args));
          });
        });
      }

      function initBoard(options) {
        if (!window.TEduBoard) throw new Error('TEduBoard SDK is not loaded');
        if (!options || !options.classId || !options.sdkAppId || !options.userId || !options.userSig) {
          throw new Error('Missing required init params: classId, sdkAppId, userId, userSig');
        }

        if (board && typeof board.destroy === 'function') board.destroy();

        boardReady = false;
        // 由 Flutter V2TIM 转发时需 dataSyncEnable=true 以产生 syncData 事件。
        var initParams = Object.assign({}, options, {
          id: options.id || BOARD_CONTAINER_ID,
          classId: Number(options.classId),
          sdkAppId: Number(options.sdkAppId),
          authConfig: Object.assign({}, options.authConfig || {}, {
            dataSyncEnable: true,
            drawEnable: options.authConfig && options.authConfig.drawEnable !== undefined
              ? options.authConfig.drawEnable
              : true
          })
        });

        board = new TEduBoard(initParams);
        bindBoardEvents();
        updateDebugPanel('initBoard', sanitizeOptionsForLog(initParams));
        return { success: true };
      }

      function destroyBoard() {
        if (board && typeof board.destroy === 'function') board.destroy();
        board = null;
        boardReady = false;
        postToFlutter('boardDestroyed', null);
        updateDebugPanel('boardDestroyed', {});
        return { success: true };
      }

      function attachBoardInvokeMethods(api, methodNames) {
        methodNames.forEach(function (name) {
          api[name] = function () {
            var args = Array.prototype.slice.call(arguments);
            return safely(name, function () { return invokeBoardMethod(name, args); });
          };
        });
      }

      // =========================================================================
      // 7. window.WhiteboardWebBridge（Flutter 入口）
      // =========================================================================
      var bridgeApi = {
        version: '1.1.0',

        init: function (options) {
          return safely('init', function () {
            if (!options || !options.classId || !options.sdkAppId || !options.userId || !options.userSig) {
              throw new Error('Missing required init params: classId, sdkAppId, userId, userSig');
            }
            if (currentInitOptions &&
              String(currentInitOptions.classId) === String(options.classId) &&
              String(currentInitOptions.sdkAppId) === String(options.sdkAppId) &&
              currentInitOptions.userId === options.userId &&
              boardReady) {
              return { success: true, reused: true, options: sanitizeOptionsForLog(currentInitOptions) };
            }
            destroyBoard();
            resetSyncChannel(options.classId);
            initBoard(options);
            currentInitOptions = options;
            return { success: true, options: sanitizeOptionsForLog(options) };
          });
        },

        destroy: function () {
          return safely('destroy', function () {
            destroyBoard();
            if (syncChannel) {
              try { syncChannel.close(); } catch (e) { }
              syncChannel = null;
              syncChannelName = '';
            }
            currentInitOptions = null;
            return { success: true };
          });
        },

        addSyncData: function (data) {
          return safely('addSyncData', function () {
            ensureBoardReady();
            board.addSyncData(data);
            return { success: true };
          });
        },

        resize: function () {
          return safely('resize', function () {
            ensureBoardReady();
            if (typeof board.resize === 'function') board.resize();
            return { success: true };
          });
        },

        invoke: function (method, args) {
          return safely(method || 'invoke', function () { return invokeBoardMethod(method, args); });
        },

        call: function (method, args) {
          return bridgeApi.invoke(method, args);
        },

        setDrawMode: function (mode) {
          return safely('setDrawMode', function () { return applyDrawMode(mode); });
        },

        setTool: function (name) {
          return safely('setTool', function () {
            ensureBoardReady();
            if (!TEduBoard || !TEduBoard.TOOL_TYPE) throw new Error('TEduBoard.TOOL_TYPE unavailable');
            var toolKey = TOOL_NAME_MAP[name];
            if (!toolKey || !TEduBoard.TOOL_TYPE[toolKey]) throw new Error('Unknown tool: ' + name);
            board.setToolType(TEduBoard.TOOL_TYPE[toolKey]);
            currentDrawMode = name === 'mouse' ? 'browse' : 'pen';
            return { tool: name, drawMode: currentDrawMode };
          });
        },

        gotoBoard: function (boardId, resetStep) {
          return safely('gotoBoard', function () {
            if (resetStep !== undefined && resetStep !== null) {
              return invokeBoardMethod('gotoBoard', [boardId, resetStep]);
            }
            return invokeBoardMethod('gotoBoard', [boardId]);
          });
        },

        switchFile: function (fileId, boardId, stepIndex) {
          return safely('switchFile', function () {
            if (boardId !== undefined && boardId !== null && boardId !== '') {
              return invokeBoardMethod('switchFile', [fileId, boardId, stepIndex || 0]);
            }
            return invokeBoardMethod('switchFile', [fileId]);
          });
        },

        addBoardWithBackgroundImage: function (url) {
          return safely('addBoardWithBackgroundImage', function () {
            if (typeof board.addBoard !== 'function') throw new Error('addBoard unavailable');
            var fitMode = TEduBoard.IMAGE_FIT_MODE
              ? TEduBoard.IMAGE_FIT_MODE.TEDU_BOARD_IMAGE_FIT_MODE_CENTER
              : undefined;
            var bgImageType = 1;
            if (TEduBoard.BACKGROUND_IMAGE && TEduBoard.BACKGROUND_IMAGE.TEDU_BOARD_BACKGROUND_IMAGE !== undefined) {
              bgImageType = TEduBoard.BACKGROUND_IMAGE.TEDU_BOARD_BACKGROUND_IMAGE;
            } else if (TEduBoard.BACKGROUND_IMAGE_TYPE &&
              TEduBoard.BACKGROUND_IMAGE_TYPE.TEDU_BOARD_BACKGROUND_IMAGE !== undefined) {
              bgImageType = TEduBoard.BACKGROUND_IMAGE_TYPE.TEDU_BOARD_BACKGROUND_IMAGE;
            }
            return { boardId: board.addBoard(url || null, fitMode, bgImageType, true) };
          });
        },

        setBackgroundImage: function (url, mode) {
          return safely('setBackgroundImage', function () {
            if (mode !== undefined && mode !== null) {
              return invokeBoardMethod('setBackgroundImage', [url, mode]);
            }
            return invokeBoardMethod('setBackgroundImage', [url]);
          });
        },

        getConstants: function () {
          return pickSdkConstants([
            'TOOL_TYPE', 'FILE_TYPE', 'ELEMENT_TYPE', 'IMAGE_FIT_MODE',
            'TEXT_STYLE', 'LINE_STYLE', 'ELLIPSE_DRAW_MODE', 'EVENT',
            'ERROR_CODE', 'WARNING_CODE', 'UPLOAD_STATUS', 'VIDEO_STATUS',
            'H5_FILE_STATUS', 'H5_PPT_STATUS', 'AUDIO_STATUS', 'IMAGE_STATUS'
          ]);
        },

        listEvents: function () {
          return Object.assign({}, EVENT_FLUTTER_TYPE_MAP);
        },

        getBoardInfo: function () {
          return safely('getBoardInfo', function () {
            ensureBoardReady();
            return {
              boardReady: boardReady,
              drawMode: currentDrawMode,
              currentBoardId: tryBoardGet(['getCurrentBoard']),
              currentFileId: tryBoardGet(['getCurrentFile']),
              boardList: tryBoardGet(['getBoardList']),
              toolType: tryBoardGet(['getToolType']),
              brushColor: tryBoardGet(['getBrushColor']),
              brushThin: tryBoardGet(['getBrushThin']),
              boardScale: tryBoardGet(['getBoardScale']),
              drawEnable: tryBoardGet(['isDrawEnable', 'getDrawEnable'])
            };
          });
        },

        setBridgeConfig: function (config) {
          bridgeConfig = Object.assign({}, bridgeConfig, config || {});
          window[bridgeConfig.jsBridge] = bridgeApi;
          return { success: true, bridgeConfig: bridgeConfig };
        },

        getState: function () {
          return {
            hasBoard: !!board,
            boardReady: boardReady,
            bridgeConfig: bridgeConfig,
            options: sanitizeOptionsForLog(currentInitOptions),
            drawMode: currentDrawMode,
            syncChannel: syncChannelName
          };
        }
      };

      attachBoardInvokeMethods(bridgeApi, BOARD_INVOKE_METHODS);

      // =========================================================================
      // 8. 启动
      // =========================================================================
      function bootstrap() {
        if (bridgeConfig.debug) {
          var debugPanel = document.getElementById(DEBUG_PANEL_ID);
          if (debugPanel) debugPanel.classList.add('is-visible');
        }

        window[bridgeConfig.jsBridge] = bridgeApi;
        postToFlutter('webBridgeReady', { bridgeConfig: bridgeConfig });
        updateDebugPanel('Web Bridge Ready', { version: bridgeApi.version });

        window.addEventListener('resize', function () {
          if (board && typeof board.resize === 'function') board.resize();
        });
      }

      bootstrap();
    })();
  </script>
</body>

</html>
